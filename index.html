<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Shower Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Tangerine:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --deep:#1b3a6b;
    --royal:#2e5da8;
    --sky:#7fb2e8;
    --mist:#d4e6f7;
    --pale:#eef6fd;
    --gold:#c9a24b;
    --ink:#16335c;
    --lily:#4a78c4;
    --lilyc:#9cc2ee;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#5a6b82;
    font-family:'Montserrat',sans-serif;
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;padding:40px 20px;
  }
  .card{
    position:relative;
    width:600px;max-width:100%;
    background:
      radial-gradient(circle at 20% 15%, rgba(127,178,232,.25), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(46,93,168,.25), transparent 45%),
      linear-gradient(160deg,#fbfdff 0%, var(--pale) 45%, var(--mist) 100%);
    border-radius:14px;
    padding:78px 50px 56px;
    overflow:hidden;
    box-shadow:0 30px 70px rgba(20,40,80,.45);
    text-align:center;
  }
  .card::before{
    content:"";position:absolute;inset:18px;
    border:1.5px solid var(--sky);
    border-radius:8px;pointer-events:none;opacity:.55;
  }
  .card::after{
    content:"";position:absolute;inset:24px;
    border:1px solid var(--gold);
    border-radius:5px;pointer-events:none;opacity:.4;
  }
  .dots{position:absolute;inset:0;pointer-events:none;}
  .dots span{position:absolute;border-radius:50%;background:var(--sky);opacity:.18;}
  .d1{width:90px;height:90px;top:-20px;right:40px;}
  .d2{width:50px;height:50px;top:140px;left:-15px;opacity:.12;}
  .d3{width:140px;height:140px;bottom:-50px;right:-30px;opacity:.1;}

  .corner{position:absolute;width:88px;height:88px;z-index:1;opacity:.85;}
  .corner.tl{top:34px;left:34px;}
  .corner.br{bottom:34px;right:34px;transform:rotate(180deg);}

  .content{position:relative;z-index:2;}

  .eyebrow{
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--royal);font-weight:500;margin:0 auto 6px;line-height:1.7;
    max-width:380px;padding:0 18px;
  }
  .divider{
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin:14px 0 8px;color:var(--gold);
  }
  .divider .line{height:1px;width:54px;background:var(--gold);opacity:.6;}
  .divider .lily{width:26px;height:26px;}

  .title{
    font-family:'Tangerine',cursive;
    font-size:96px;line-height:.85;color:var(--deep);
    font-weight:700;margin:4px 0 2px;
  }
  .sub{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;font-size:26px;color:var(--royal);margin-bottom:18px;
  }

  .lead{
    font-family:'Cormorant Garamond',serif;
    font-size:20px;color:var(--ink);margin-bottom:4px;
  }
  .names{
    font-family:'Tangerine',cursive;
    font-size:62px;color:var(--royal);line-height:1;margin:0 0 16px;
  }

  .details{
    background:rgba(255,255,255,.55);
    border-top:1px solid var(--mist);
    border-bottom:1px solid var(--mist);
    padding:22px 10px;margin:16px 0 14px;
  }
  .details .row{
    font-family:'Cormorant Garamond',serif;
    font-size:21px;color:var(--ink);margin:7px 0;letter-spacing:.3px;
  }
  .details .row .bs{font-size:16px;font-style:italic;color:var(--royal);}
  .details .row strong{
    font-family:'Montserrat',sans-serif;font-weight:500;
    font-size:12px;letter-spacing:3px;text-transform:uppercase;
    color:var(--royal);display:block;margin-bottom:2px;
  }
  .map{
    display:inline-block;margin-top:4px;
    font-family:'Montserrat',sans-serif;font-size:12px;
    letter-spacing:2px;text-transform:uppercase;font-weight:500;
    color:var(--lily);text-decoration:none;
    border-bottom:1px solid var(--lilyc);padding-bottom:2px;
  }
  .map:hover{color:var(--deep);border-color:var(--gold);}

  .footer{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:18px;color:var(--royal);margin-top:16px;
  }

  @media print{
    body{background:#fff;padding:0;}
    .card{box-shadow:none;}
  }
  @media(max-width:480px){
    .card{padding:54px 26px 44px;}
    .title{font-size:72px;}
    .names{font-size:46px;}
    .corner{width:80px;height:80px;}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="dots">
      <span class="d1"></span><span class="d2"></span><span class="d3"></span>
    </div>

    <svg class="corner tl" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#4a78c4" stroke-width="2" stroke-linecap="round" opacity="0.85">
        <path d="M50 78 Q50 50 50 30" />
        <path d="M50 40 Q30 26 18 34 Q30 40 50 48" fill="#9cc2ee" fill-opacity="0.35"/>
        <path d="M50 40 Q70 26 82 34 Q70 40 50 48" fill="#9cc2ee" fill-opacity="0.35"/>
        <path d="M50 34 Q42 14 50 4 Q58 14 50 34" fill="#7fb2e8" fill-opacity="0.4"/>
        <path d="M50 40 Q40 30 38 18" />
        <path d="M50 40 Q60 30 62 18" />
        <path d="M40 80 Q34 70 36 60" stroke="#7fb2e8"/>
        <path d="M60 80 Q66 70 64 60" stroke="#7fb2e8"/>
      </g>
    </svg>
    <svg class="corner br" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#4a78c4" stroke-width="2" stroke-linecap="round" opacity="0.85">
        <path d="M50 78 Q50 50 50 30" />
        <path d="M50 40 Q30 26 18 34 Q30 40 50 48" fill="#9cc2ee" fill-opacity="0.35"/>
        <path d="M50 40 Q70 26 82 34 Q70 40 50 48" fill="#9cc2ee" fill-opacity="0.35"/>
        <path d="M50 34 Q42 14 50 4 Q58 14 50 34" fill="#7fb2e8" fill-opacity="0.4"/>
        <path d="M50 40 Q40 30 38 18" />
        <path d="M50 40 Q60 30 62 18" />
        <path d="M40 80 Q34 70 36 60" stroke="#7fb2e8"/>
        <path d="M60 80 Q66 70 64 60" stroke="#7fb2e8"/>
      </g>
    </svg>

    <div class="content">
      <p class="eyebrow">Our hearts are full, our joy is true &mdash; a baby boy is almost due</p>
      <h1 class="title">Baby Shower</h1>
      <p class="sub">It's a Boy!</p>

      <div class="divider">
        <span class="line"></span>
        <svg class="lily" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g fill="none" stroke="#c9a24b" stroke-width="3" stroke-linecap="round">
            <path d="M50 50 Q30 36 20 44 Q32 52 50 58" fill="#9cc2ee" fill-opacity="0.5"/>
            <path d="M50 50 Q70 36 80 44 Q68 52 50 58" fill="#9cc2ee" fill-opacity="0.5"/>
            <path d="M50 44 Q42 22 50 10 Q58 22 50 44" fill="#7fb2e8" fill-opacity="0.55"/>
          </g>
        </svg>
        <span class="line"></span>
      </div>

      <p class="lead">Celebrating the little one of</p>
      <p class="names">Dushyanta &amp; Shanta</p>

      <div class="details">
        <p class="row"><strong>Date</strong>Friday, May 29 <span class="bs">&middot; Jestha 15, 2083 BS</span></p>
        <p class="row"><strong>Time</strong>5:00 PM &ndash; 9:00 PM</p>
        <p class="row"><strong>Venue</strong>Diyalo Foodland, Kalikanagar</p>
        <a class="map" href="https://www.google.com/maps/search/?api=1&query=Diyalo%20Foodland%20Kalikanagar&query_place_id=ChIJGbY4DgCHljkRy7ybhnO_-9Y" target="_blank" rel="noopener">View on Map &rsaquo;</a>
      </div>

      <p class="footer">Your presence will make our joy complete</p>
    </div>
  </div>
</body>
</html>
